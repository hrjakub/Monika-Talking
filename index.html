<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monika Visualizer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <canvas id="visualizer" aria-hidden="true"></canvas>

      <section class="centerpiece" aria-label="Monika audio visualizer">
        <div class="center-glow"></div>
        <div class="nameplate">
          <h1>MONIKA</h1>
          <p class="eyebrow">Here For You</p>
        </div>
      </section>

      <div class="controls">
        <button id="playToggle" class="control-button play-toggle" type="button" aria-pressed="false">
          <span class="play-label">Play Voice</span>
          <span id="statusText" class="status-text">Ready</span>
        </button>

        <button id="exportButton" class="control-button export-toggle" type="button">
          <span class="play-label">Export Video</span>
          <span id="exportStatus" class="status-text">MP4 if supported</span>
        </button>
      </div>

      <audio id="audioTrack" preload="auto" src="./monika.mp3"></audio>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
